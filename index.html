<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geyve Fidancılık | Sipariş</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f0f9ff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; color: #000; overflow-x: hidden; }
        .comic-box { width: 90%; max-width: 320px; margin: 10px auto; border: 4px solid #000; border-radius: 20px 50px 20px 50px; background: #fff; box-shadow: 6px 6px 0px #000; text-align: center; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        header { display: flex; align-items: center; justify-content: center; width: 100%; gap: 5px; margin-top: 10px; }
        .logo-icon { font-size: 2rem; }
        .header-box { background: #ffce00; margin: 0; }
        header h1 { font-family: 'Bangers', cursive; font-size: 1.6rem; margin: 0; text-transform: uppercase; }
        #cart-status { position: fixed; top: 10px; right: 10px; z-index: 1000; background: #ff4757; color: white; padding: 8px 15px; border: 3px solid #000; border-radius: 50px; font-family: 'Bangers'; font-size: 1rem; cursor: pointer; display: none; box-shadow: 4px 4px 0px #000; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .product-card { width: 155px; padding: 10px; background: #fff; border-radius: 15px 30px; border: 3px solid #000; transition: transform 0.2s; }
        .img-box { width: 100%; height: 110px; overflow: hidden; border: 3px solid #000; border-radius: 10px; margin-bottom: 8px; background: #e0e0e0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .product-name { font-size: 0.85rem; font-weight: 900; min-height: 35px; }
        .price { font-size: 1.1rem; font-weight: 900; color: #2ed573; margin-bottom: 8px; display: block; -webkit-text-stroke: 0.5px black; }
        .buy-btn { background: #ffce00; border: 3px solid #000; padding: 8px; font-family: 'Bangers'; font-size: 1rem; cursor: pointer; border-radius: 10px; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #fff; padding: 25px; width: 100%; max-width: 350px; border: 4px solid #000; border-radius: 30px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid #000; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="cart-status" onclick="sepetiGoster()">🛒 SEPET (<span id="cart-count">0</span>)</div>

    <header>
        <span class="logo-icon">🌳</span>
        <div class="header-box comic-box"><h1>GEYVE FİDANCILIK</h1></div>
        <span class="logo-icon">🌳</span>
    </header>

    <main id="fidan-container" class="container"></main>

    <div class="footer-balon comic-box" style="background: #7bed9f; margin-top: 30px;">
        <strong>Fedayi Özkan</strong>
        <div style="font-size: 0.8rem; font-weight: 700;">📞 0554 128 62 54</div>
        <div style="font-size: 0.7rem; margin-top: 10px; background: rgba(255,255,255,0.4); padding: 8px; border-radius: 10px;">DENİZBANK: TR63 0013 4000 0170 2783 0000 01</div>
    </div>

    <button onclick="adminAc()" style="margin:40px 0; opacity:0.3; background:none; border:none; cursor:pointer;">[ Yönetim Paneli ]</button>

    <div id="cart-modal" class="modal"><div class="modal-content"><h2 style="font-family:Bangers;">🛒 Sepetiniz</h2><div id="cart-list"></div><h3 id="total-price">0 TL</h3><button onclick="odemeAdiminaGec()" style="background:#2ed573; width:100%; padding:15px; border:3px solid #000; border-radius:12px; font-family:Bangers; font-size:1.3rem;">SİPARİŞ VER</button><br><button onclick="modalKapat('cart-modal')" style="margin-top:15px; border:none; color:red; font-weight:bold;">Kapat</button></div></div>
    <div id="checkout-modal" class="modal"><div class="modal-content"><h2 style="font-family:Bangers;">📝 Bilgiler</h2><input type="text" id="cust-name" placeholder="Ad Soyad"><input type="tel" id="cust-tel" placeholder="Telefon"><textarea id="cust-address" placeholder="Adres"></textarea><button onclick="siparisOnayla()" id="btn-onay" style="background:#ffce00; width:100%; padding:15px; border:3px solid #000; border-radius:12px; font-family:Bangers;">PDF İNDİR</button></div></div>
    <div id="admin-modal" class="modal"><div class="modal-content"><h3>🛠 Ürün Yönetimi</h3><input type="text" id="p-ad" placeholder="Fidan Adı"><input type="number" id="p-fiyat" placeholder="Fiyat"><input type="file" id="p-dosya" accept="image/*"><button onclick="urunKaydet()" style="background:#2ed573; width:100%; padding:12px; border:3px solid #000; border-radius:10px;">EKLE</button><hr><div id="admin-product-list" style="max-height:150px; overflow-y:auto;"></div><button onclick="modalKapat('admin-modal')" style="margin-top:15px; border:none; color:red;">Kapat</button></div></div>

    <script>
        // Resimlerin klasörden çekilmesi için sabit liste
        const sabitFidanlar = [
            {ad: "Akasya", fiyat: "150", resim: "resimler/Akasya.jpg"},
            {ad: "Ayva", fiyat: "120", resim: "resimler/Ayva.jpg"},
            {ad: "Can Erik", fiyat: "130", resim: "resimler/Can erik.jpg"},
            {ad: "Ceviz", fiyat: "140", resim: "resimler/Ceviz.jpg"},
            {ad: "Elma", fiyat: "110", resim: "resimler/Elma.jpg"},
            {ad: "Kayısı", fiyat: "125", resim: "resimler/Kayısı.jpg"},
            {ad: "Kiraz", fiyat: "135", resim: "resimler/Kiraz.jpg"}
        ];

        // Eğer tarayıcıda yeni eklenen ürün varsa onu al, yoksa sabit listeyi kullan
        let fidanlar = JSON.parse(localStorage.getItem('geyve_v18_data')) || sabitFidanlar;
        let sepet = [];

        function ciz() {
            const container = document.getElementById('fidan-container');
            container.innerHTML = fidanlar.map((f, index) => `
                <div class="product-card">
                    <div class="img-box"><img src="${f.resim}" onerror="this.src='https://via.placeholder.com/150?text=Resim+Hata'"></div>
                    <div class="product-name">${f.ad}</div>
                    <span class="price">${f.fiyat} TL</span>
                    <button class="buy-btn" onclick="sepeteEkle(${index})">SEPETE EKLE</button>
                </div>
            `).join('');
            adminListele();
        }

        function sepeteEkle(index) {
            const urun = fidanlar[index];
            const varMi = sepet.find(item => item.ad === urun.ad);
            if(varMi) { varMi.adet++; } else { sepet.push({...urun, adet: 1}); }
            sepetGuncelle();
            document.getElementById('cart-status').style.display = 'block';
        }

        function sepetGuncelle() {
            const list = document.getElementById('cart-list');
            let toplam = 0; let adet = 0;
            list.innerHTML = sepet.map((item) => {
                toplam += (item.fiyat * item.adet); adet += item.adet;
                return `<div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;"><span>${item.ad} (x${item.adet})</span><span>${item.fiyat * item.adet} TL</span></div>`;
            }).join('');
            document.getElementById('cart-count').innerText = adet;
            document.getElementById('total-price').innerText = `Toplam: ${toplam} TL`;
        }

        function sepetiGoster() { document.getElementById('cart-modal').style.display = 'flex'; }
        function modalKapat(id) { document.getElementById(id).style.display = 'none'; }
        function odemeAdiminaGec() { modalKapat('cart-modal'); document.getElementById('checkout-modal').style.display = 'flex'; }

        async function siparisOnayla() {
            const ad = document.getElementById('cust-name').value;
            const tel = document.getElementById('cust-tel').value;
            if(!ad || !tel) return alert("Bilgileri girin!");
            const opt = { margin: 10, filename: `Siparis_${ad}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            const temp = document.createElement('div');
            temp.innerHTML = `<h1>GEYVE FİDANCILIK</h1><p>Müşteri: ${ad}</p><ul>${sepet.map(i => `<li>${i.ad} x ${i.adet}</li>`).join('')}</ul>`;
            await html2pdf().set(opt).from(temp).save();
            window.open(`https://wa.me/905541286254?text=Sipariş verdim, PDF hazır.`, '_blank');
        }

        function urunKaydet() {
            const ad = document.getElementById('p-ad').value;
            const fiyat = document.getElementById('p-fiyat').value;
            const dosya = document.getElementById('p-dosya').files[0];
            if(!ad || !fiyat || !dosya) return alert("Eksik bilgi!");
            const reader = new FileReader();
            reader.onload = function(e) {
                fidanlar.push({ad, fiyat, resim: e.target.result});
                localStorage.setItem('geyve_v18_data', JSON.stringify(fidanlar));
                ciz();
            }
            reader.readAsDataURL(dosya);
        }

        function adminListele() {
            document.getElementById('admin-product-list').innerHTML = fidanlar.map((f, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${f.ad}</span><button onclick="fidanlar.splice(${i},1);localStorage.setItem('geyve_v18_data', JSON.stringify(fidanlar));ciz();" style="color:red;">Sil</button></div>`).join('');
        }

        function adminAc() { if(prompt("Şifre:") === "geyve54") document.getElementById('admin-modal').style.display = 'flex'; }

        window.onload = ciz;
    </script>
</body>
</html>
