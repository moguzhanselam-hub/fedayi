<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geyve Fidancılık | Hızlı Sipariş</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f9ff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; color: #000; }
        .comic-box { width: 95%; max-width: 400px; margin: 10px auto; border: 4px solid #000; border-radius: 20px 50px; background: #fff; box-shadow: 6px 6px 0px #000; padding: 15px; text-align: center; box-sizing: border-box; }
        .header-box { background: #ffce00; }
        header h1 { font-family: 'Bangers', cursive; font-size: 2rem; margin: 0; letter-spacing: 2px; }
        
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 800px; margin-top: 15px; }
        .product-card { background: #fff; border: 3px solid #000; border-radius: 15px; padding: 8px; text-align: center; box-shadow: 4px 4px 0 #000; display: flex; flex-direction: column; justify-content: space-between; }
        .img-box { width: 100%; height: 120px; border: 2px solid #000; border-radius: 10px; overflow: hidden; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .product-name { font-size: 0.9rem; font-weight: 900; margin: 8px 0; min-height: 35px; line-height: 1.2; }
        .price { font-size: 1.2rem; font-weight: 900; color: #16a34a; margin-bottom: 8px; display: block; }
        
        .buy-btn { background: #2ed573; border: 3px solid #000; padding: 10px; font-family: 'Bangers'; font-size: 1.1rem; cursor: pointer; border-radius: 10px; width: 100%; color: #000; }
        .buy-btn:active { transform: translate(2px, 2px); box-shadow: none; }

        /* Yönetim Paneli Tasarımı */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; color: white; padding: 20px; overflow-y: auto; }
        .admin-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; font-size: 1rem; font-weight: bold; }
        .admin-btn { background: #facc15; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .publish-btn { background: #ff4757; color: white; padding: 20px; width: 100%; font-size: 1.3rem; font-family: 'Bangers'; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }
        
        .footer { background: #86efac; margin-top: 30px; font-size: 0.9rem; }
        
        @media (max-width: 400px) { .container { gap: 8px; } }
    </style>
</head>
<body>

    <header class="comic-box header-box">
        <h1>GEYVE FİDANCILIK</h1>
    </header>

    <main id="fidan-container" class="container">
        </main>

    <div class="comic-box footer">
        <strong style="font-size: 1.2rem;">Fedayi Özkan</strong><br>
        📞 0554 128 62 54<br>
        <span style="font-size: 0.7rem;">Geyve / Sakarya</span>
    </div>

    <button onclick="adminAc()" style="margin:40px; opacity:0.3; background:none; border:none; cursor:pointer;">[ Yönetim Paneli ]</button>

    <div id="admin-panel">
        <h2 style="font-family: Bangers; color: #facc15; font-size: 2rem;">🛠 FİDAN YÖNETİMİ</h2>
        <p>Yeni ürün ekleyin veya mevcutları silin.</p>
        
        <input type="text" id="p-ad" class="admin-input" placeholder="Fidan Adı (Örn: Deveci Armudu)">
        <input type="number" id="p-fiyat" class="admin-input" placeholder="Fiyat (Sadece rakam)">
        <input type="text" id="p-resim" class="admin-input" placeholder="Resim Yolu (Örn: resimler/armut.jpg)">
        
        <button onclick="urunEkle()" class="admin-btn">➕ LİSTEYE EKLE</button>
        
        <div id="admin-liste" style="margin-top:20px; background: #222; padding: 10px; border-radius: 10px;"></div>
        
        <button onclick="yayinla()" class="publish-btn">🚀 SİTEYİ GÜNCELLE VE YAYINLA</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:#555; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:15px;">Vazgeç / Kapat</button>
    </div>

    <script>
        // FEDAYİ BEY BURAYI GÜNCELLEYECEK - ÜRÜN LİSTESİ
        let fidanlar = [
            {ad: "Akasya Fidanı", fiyat: "150", resim: "resimler/akasya.jpg"},
            {ad: "Deveci Armut", fiyat: "120", resim: "resimler/Ayva.jpg"},
            {ad: "Can Erik", fiyat: "130", resim: "resimler/Can erik.jpg"}
        ];

        // Ürünleri Ekrana Basan Fonksiyon
        function ciz() {
            const container = document.getElementById('fidan-container');
            container.innerHTML = fidanlar.map((f, i) => `
                <div class="product-card">
                    <div class="img-box"><img src="${f.resim}" onerror="this.src='https://via.placeholder.com/150?text=Fidan'"></div>
                    <div class="product-name">${f.ad}</div>
                    <div class="price">${f.fiyat} TL</div>
                    <button class="buy-btn" onclick="siparisVer('${f.ad}', '${f.fiyat}')">SİPARİŞ VER</button>
                </div>
            `).join('');
            adminListele();
        }

        // WhatsApp Sipariş Mesajı Oluşturucu
        function siparisVer(ad, fiyat) {
            const mesaj = `Merhaba Fedayi Bey, sitenizden "${ad}" (Fiyat: ${fiyat} TL) hakkında bilgi almak ve sipariş vermek istiyorum.`;
            const tel = "905541286254";
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(mesaj)}`, '_blank');
        }

        // Yönetim Paneli Şifreli Giriş
        function adminAc() { 
            if(prompt("Yönetici Şifresi:") === "geyve54") {
                document.getElementById('admin-panel').style.display='block'; 
            }
        }
        
        // Yeni Ürün Ekleme
        function urunEkle() {
            const ad = document.getElementById('p-ad').value;
            const fiyat = document.getElementById('p-fiyat').value;
            const resim = document.getElementById('p-resim').value || "resimler/default.jpg";
            
            if(ad && fiyat) {
                fidanlar.push({ad, fiyat, resim});
                document.getElementById('p-ad').value = "";
                document.getElementById('p-fiyat').value = "";
                ciz();
            } else {
                alert("Lütfen isim ve fiyat girin!");
            }
        }

        // Admin Panelindeki Listeyi Güncelle
        function adminListele() {
            const listeDiv = document.getElementById('admin-liste');
            listeDiv.innerHTML = fidanlar.map((f, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;">
                    <span style="font-size:0.9rem;">${f.ad} (${f.fiyat} TL)</span>
                    <button onclick="fidanlar.splice(${i},1);ciz();" style="background:#ff4757; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Sil</button>
                </div>
            `).join('');
        }

        // KRİTİK: TÜM SİTEYİ GÜNCELLEYİP GITHUB'A HAZIRLAR
        function yayinla() {
            let tumSayfaKodu = document.documentElement.outerHTML;
            
            // Kodun içindeki fidanlar dizisini bul ve yenisiyle değiştir
            let eskiVeriDeseni = /let fidanlar = \[[\s\S]*?\];/;
            let yeniVeriYazisi = `let fidanlar = ${JSON.stringify(fidanlar, null, 12)};`;
            
            // Başına DOCTYPE ekleyerek kodu temizle
            let nihaiKod = "<!DOCTYPE html>\n" + tumSayfaKodu.replace(eskiVeriDeseni, yeniVeriYazisi);

            // Kodu kopyala ve GitHub sayfasını aç
            navigator.clipboard.writeText(nihaiKod).then(() => {
                alert("✅ SİTE KODU KOPYALANDI!\n\nŞimdi açılan GitHub sayfasındaki tüm kodları silin ve bu yenisini yapıştırın.");
                window.open('https://github.com/moguzhanselam-hub/fedayi/edit/main/index.html', '_blank');
            }).catch(err => {
                alert("Kopyalama başarısız, lütfen manuel kopyalayın.");
            });
        }

        // Sayfa ilk açıldığında ürünleri göster
        window.onload = ciz;
    </script>
</body>
</html>
